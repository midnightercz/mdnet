<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MDNet - Markdown Wiki</title>
  <style>
    /* Solarized Color Scheme */
    :root {
      --base03: #002b36;
      --base02: #073642;
      --base01: #586e75;
      --base00: #657b83;
      --base0:  #839496;
      --base1:  #93a1a1;
      --base2:  #eee8d5;
      --base3:  #fdf6e3;
      --yellow: #b58900;
      --orange: #cb4b16;
      --red:    #dc322f;
      --magenta:#d33682;
      --violet: #6c71c4;
      --blue:   #268bd2;
      --cyan:   #2aa198;
      --green:  #859900;
    }

    /* Dark theme (default) */
    body {
      --bg-primary: var(--base03);
      --bg-secondary: var(--base02);
      --text-primary: var(--base1);
      --text-secondary: var(--base01);
      --text-emphasis: var(--base2);
      --border-color: var(--base01);
    }

    /* Light theme */
    body.light-theme {
      --bg-primary: var(--base3);
      --bg-secondary: var(--base2);
      --text-primary: var(--base00);
      --text-secondary: var(--base1);
      --text-emphasis: var(--base01);
      --border-color: var(--base1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      line-height: 1.6;
      color: var(--text-primary);
      background: var(--bg-primary);
      transition: background-color 0.3s, color 0.3s;
    }
    .container {
      width: 80%;
      max-width: 100%;
      margin: 0 auto;
      min-height: 100vh;
      background: var(--bg-primary);
      padding: 40px;
      position: relative;
    }
    #error {
      background: var(--red);
      color: var(--base3);
      padding: 15px;
      border-radius: 4px;
      margin-bottom: 20px;
      display: none;
    }
    #source-badge {
      display: none;
      background: var(--bg-secondary);
      border-left: 4px solid var(--blue);
      padding: 8px 15px;
      margin-bottom: 20px;
      border-radius: 4px;
      font-size: 0.9em;
      color: var(--text-secondary);
    }
    #source-badge.visible {
      display: block;
    }
    #source-badge .source-name {
      color: var(--blue);
      font-weight: 600;
      margin-left: 5px;
    }
    #content { width: 100%; }
    .loading { color: var(--text-secondary); font-style: italic; }

    /* Markdown styling */
    #content h1 {
      font-size: 2em;
      margin: 0.5em 0;
      border-bottom: 2px solid var(--bg-secondary);
      padding-bottom: 0.3em;
      color: var(--orange);
    }
    #content h2 {
      font-size: 1.5em;
      margin: 0.75em 0 0.5em;
      color: var(--orange);
    }
    #content h3 {
      font-size: 1.25em;
      margin: 0.75em 0 0.5em;
      color: var(--orange);
    }
    #content p { margin: 1em 0; }
    #content a {
      color: var(--blue);
      text-decoration: none;
      padding: 2px 4px;
      border-radius: 3px;
      transition: background 0.2s, color 0.2s;
    }
    #content a:hover {
      background: var(--blue);
      color: var(--bg-primary);
      text-decoration: none;
    }
    #content ul, #content ol { margin: 1em 0; padding-left: 2em; }
    #content li { margin: 0.5em 0; }
    #content code {
      background: var(--bg-secondary);
      color: var(--cyan);
      padding: 2px 6px;
      border-radius: 3px;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      font-size: 0.9em;
    }
    #content pre {
      background: var(--bg-secondary);
      color: var(--text-primary);
      padding: 15px;
      border-radius: 5px;
      overflow-x: auto;
      margin: 1em 0;
      border: 1px solid var(--border-color);
    }
    #content pre code {
      background: none;
      padding: 0;
      color: inherit;
    }
    #content strong {
      color: var(--yellow);
      font-weight: bold;
    }
    #content em {
      color: var(--green);
      font-style: italic;
    }
    #content blockquote {
      border-left: 4px solid var(--blue);
      padding-left: 1em;
      margin: 1em 0;
      color: var(--text-secondary);
    }

    /* Wiki links */
    .wiki-link {
      color: var(--green);
      font-weight: 500;
      padding: 2px 4px;
      border-radius: 3px;
      transition: background 0.2s, color 0.2s;
    }
    .wiki-link:hover {
      background: var(--green);
      color: var(--bg-primary);
      text-decoration: none;
    }

    /* Hashtag links */
    .hashtag-link {
      color: var(--cyan);
      font-weight: 500;
      padding: 2px 4px;
      border-radius: 3px;
      transition: background 0.2s, color 0.2s;
      text-decoration: none;
      cursor: pointer;
    }
    .hashtag-link:hover {
      background: var(--cyan);
      color: var(--bg-primary);
      text-decoration: none;
    }

    /* Plugin blocks */
    .plugin-block {
      border: 2px solid var(--bg-secondary);
      border-radius: 8px;
      margin: 1.5em 0;
      background: var(--bg-secondary);
    }
    .plugin-header {
      background: var(--bg-secondary);
      padding: 8px 15px;
      font-weight: 600;
      color: var(--yellow);
      border-bottom: 1px solid var(--border-color);
      font-size: 0.9em;
    }
    .plugin-content {
      padding: 15px;
      margin: 0;
      background: var(--bg-primary);
      border-radius: 0 0 6px 6px;
      color: var(--text-primary);
    }
    .plugin-name {
      display: inline-block;
    }
    .plugin-status {
      color: var(--green);
      font-size: 0.8em;
      margin-left: 8px;
    }
    .plugin-status-disabled {
      color: var(--text-secondary);
      font-size: 0.8em;
      margin-left: 8px;
    }
    .plugin-render-area {
      /* Container for dynamically rendered content */
    }
    .plugin-disabled-message {
      padding: 20px;
      text-align: center;
      color: var(--text-secondary);
    }
    .plugin-disabled-message .enable-plugin-link {
      color: var(--blue);
      text-decoration: underline;
      cursor: pointer;
    }
    .plugin-disabled-message .enable-plugin-link:hover {
      color: var(--green);
    }
    .plugin-error {
      padding: 15px;
      background: var(--red);
      color: var(--base3);
      border-radius: 4px;
      margin: 10px 0;
    }
    .mermaid-diagram {
      padding: 10px;
      text-align: center;
    }
    .mermaid-diagram svg {
      max-width: 100%;
      height: auto;
    }

    /* Plugin Manager Modal */
    #plugin-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: flex-start;
      justify-content: center;
      z-index: 2000;
      padding-top: 80px;
    }
    #plugin-modal.active {
      display: flex;
    }
    .plugin-container {
      background: var(--bg-primary);
      border: 2px solid var(--border-color);
      border-radius: 8px;
      width: 90%;
      max-width: 800px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }
    .plugin-header {
      padding: 20px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg-primary);
    }
    .plugin-header h2 {
      color: var(--orange);
      font-size: 1.5em;
      margin: 0;
    }
    .plugin-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      background: var(--bg-primary);
      border-radius: 0 0 6px 6px;
    }
    .plugin-list {
      margin-bottom: 30px;
    }
    .plugin-item {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 15px;
      margin-bottom: 10px;
      background: var(--bg-secondary);
      border: 2px solid var(--border-color);
      border-radius: 8px;
      transition: border-color 0.2s;
    }
    .plugin-item.enabled {
      border-color: var(--green);
    }
    .plugin-item-icon {
      font-size: 2em;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-primary);
      border-radius: 8px;
    }
    .plugin-item-info {
      flex: 1;
    }
    .plugin-item-name {
      font-size: 1.1em;
      font-weight: 600;
      color: var(--yellow);
      margin-bottom: 4px;
    }
    .plugin-item-description {
      color: var(--text-primary);
      margin-bottom: 4px;
    }
    .plugin-item-meta {
      font-size: 0.85em;
      color: var(--text-secondary);
    }
    .plugin-item-actions {
      display: flex;
      gap: 10px;
    }
    .plugin-toggle {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 26px;
    }
    .plugin-toggle-checkbox {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .plugin-toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: var(--bg-secondary);
      border: 2px solid var(--border-color);
      transition: 0.3s;
      border-radius: 26px;
    }
    .plugin-toggle-slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 2px;
      bottom: 2px;
      background-color: var(--text-secondary);
      transition: 0.3s;
      border-radius: 50%;
    }
    .plugin-toggle-checkbox:checked + .plugin-toggle-slider {
      background-color: var(--green);
      border-color: var(--green);
    }
    .plugin-toggle-checkbox:checked + .plugin-toggle-slider:before {
      transform: translateX(24px);
      background-color: var(--bg-primary);
    }
    .plugin-empty-state {
      padding: 40px;
      text-align: center;
      color: var(--text-secondary);
    }
    .plugin-install-section {
      padding: 20px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
    }
    .plugin-install-section h3 {
      color: var(--orange);
      margin-bottom: 15px;
    }
    .plugin-install-section input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      background: var(--bg-primary);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
    }
    .plugin-install-section input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .plugin-install-section button {
      background: var(--blue);
      color: var(--bg-primary);
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      font-weight: 600;
      transition: background 0.2s;
    }
    .plugin-install-section button:hover:not(:disabled) {
      background: var(--green);
    }
    .plugin-install-section button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Front matter */
    .front-matter {
      margin: 1em 0 2em 0;
      border: 1px solid var(--bg-secondary);
      border-radius: 4px;
      background: var(--bg-secondary);
    }
    .front-matter summary {
      padding: 8px 15px;
      cursor: pointer;
      font-weight: 600;
      color: var(--yellow);
      user-select: none;
      list-style: none;
    }
    .front-matter summary::-webkit-details-marker {
      display: none;
    }
    .front-matter summary::before {
      content: '▶ ';
      display: inline-block;
      transition: transform 0.2s;
    }
    .front-matter[open] summary::before {
      transform: rotate(90deg);
    }
    .front-matter summary:hover {
      background: var(--bg-secondary);
      color: var(--green);
    }
    .fm-table {
      width: 100%;
      border-collapse: collapse;
      margin: 0;
      font-size: 0.9em;
    }
    .fm-table td {
      padding: 6px 15px;
      border-top: 1px solid var(--border-color);
    }
    .fm-key {
      color: var(--blue);
      font-weight: 600;
      width: 30%;
    }
    .fm-value {
      color: var(--text-primary);
    }

    /* Toggle buttons */
    .toggle-buttons {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 10px;
      z-index: 1000;
    }
    #layout-toggle, #theme-toggle, #search-toggle {
      background: var(--bg-secondary);
      color: var(--yellow);
      border: 1px solid var(--border-color);
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      font-size: 1.1em;
      font-weight: 600;
      transition: background 0.2s, color 0.2s;
      min-width: 38px;
      text-align: center;
    }
    #layout-toggle:hover, #theme-toggle:hover, #search-toggle:hover {
      background: var(--blue);
      color: var(--bg-primary);
    }

    /* Layout containers */
    .layout-container {
      width: 100%;
    }
    .layout-container[data-layout="columns"] {
      display: flex;
      gap: 30px;
      align-items: flex-start;
    }
    .layout-container[data-layout="simple"] .layout-column {
      width: 100%;
    }
    .layout-column {
      flex: 1;
    }

    /* Responsive: stack columns on mobile */
    @media (max-width: 768px) {
      .container {
        padding: 20px;
      }
      .toggle-buttons {
        top: 10px;
        right: 10px;
      }
      #layout-toggle, #theme-toggle {
        padding: 6px 10px;
        font-size: 1em;
        min-width: 34px;
      }
      .layout-container[data-layout="columns"] {
        flex-direction: column;
        gap: 20px;
      }
      .layout-column {
        width: 100% !important;
      }
    }

    /* Search modal */
    #search-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: flex-start;
      justify-content: center;
      z-index: 2000;
      padding-top: 80px;
    }
    #search-modal.active {
      display: flex;
    }
    .search-container {
      background: var(--bg-primary);
      border: 2px solid var(--border-color);
      border-radius: 8px;
      width: 90%;
      max-width: 700px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }
    .search-header {
      padding: 20px;
      border-bottom: 1px solid var(--border-color);
    }
    #search-input {
      width: 100%;
      padding: 12px 15px;
      font-size: 1em;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      outline: none;
    }
    #search-input:focus {
      border-color: var(--blue);
    }
    .search-results {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }
    .search-result-item {
      padding: 12px 15px;
      margin: 5px 0;
      background: var(--bg-secondary);
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .search-result-item:hover {
      background: var(--blue);
      color: var(--bg-primary);
    }
    .search-result-title {
      font-weight: 600;
      font-size: 1em;
      margin-bottom: 4px;
    }
    .search-result-meta {
      font-size: 0.85em;
      color: var(--text-secondary);
    }
    .search-result-item:hover .search-result-meta {
      color: var(--bg-primary);
      opacity: 0.8;
    }
    .search-no-results {
      padding: 40px 20px;
      text-align: center;
      color: var(--text-secondary);
    }
    .search-pagination {
      padding: 15px 20px;
      border-top: 1px solid var(--border-color);
      display: flex;
      justify-content: center;
      gap: 10px;
      align-items: center;
    }
    .search-pagination button {
      background: var(--bg-secondary);
      color: var(--yellow);
      border: 1px solid var(--border-color);
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      transition: background 0.2s, color 0.2s;
    }
    .search-pagination button:hover:not(:disabled) {
      background: var(--blue);
      color: var(--bg-primary);
    }
    .search-pagination button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .search-pagination-info {
      color: var(--text-secondary);
      font-size: 0.9em;
    }
    @media (max-width: 768px) {
      #search-modal {
        padding-top: 60px;
      }
      .search-container {
        width: 95%;
        max-height: 85vh;
      }
    }

    /* Settings modal */
    #settings-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: flex-start;
      justify-content: center;
      z-index: 2000;
      padding-top: 80px;
    }
    #settings-modal.active {
      display: flex;
    }
    .settings-container {
      background: var(--bg-primary);
      border: 2px solid var(--border-color);
      border-radius: 8px;
      width: 90%;
      max-width: 800px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }
    .settings-header {
      padding: 20px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .settings-header h2 {
      color: var(--orange);
      font-size: 1.5em;
      margin: 0;
    }
    .close-button {
      background: var(--bg-secondary);
      color: var(--yellow);
      border: 1px solid var(--border-color);
      padding: 8px 15px;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      font-size: 1.5em;
      font-weight: 600;
      transition: background 0.2s, color 0.2s;
      line-height: 1;
    }
    .close-button:hover {
      background: var(--red);
      color: var(--bg-primary);
    }
    .settings-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }
    .sources-list {
      margin-bottom: 30px;
    }
    .source-item {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      padding: 15px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .source-info {
      flex: 1;
    }
    .source-info strong {
      display: block;
      color: var(--yellow);
      font-size: 1.1em;
      margin-bottom: 8px;
    }
    .source-urls {
      font-size: 0.85em;
      color: var(--text-secondary);
    }
    .source-urls div {
      margin: 4px 0;
      word-break: break-all;
    }
    .remove-source-btn {
      background: var(--bg-secondary);
      color: var(--red);
      border: 1px solid var(--border-color);
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
    }
    .remove-source-btn:hover {
      background: var(--red);
      color: var(--bg-primary);
    }
    .add-source-form {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      padding: 20px;
    }
    .add-source-form h3 {
      color: var(--orange);
      font-size: 1.2em;
      margin-bottom: 15px;
    }
    .add-source-form input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      font-size: 0.9em;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      background: var(--bg-primary);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      outline: none;
    }
    .add-source-form input:focus {
      border-color: var(--blue);
    }
    .add-source-form button {
      background: var(--blue);
      color: var(--bg-primary);
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      font-weight: 600;
      transition: background 0.2s;
    }
    .add-source-form button:hover {
      background: var(--green);
    }
    #cancel-edit-btn {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
    }
    #cancel-edit-btn:hover {
      background: var(--red);
      color: var(--bg-primary);
    }
    .search-result-source {
      display: inline-block;
      background: var(--blue);
      color: var(--bg-primary);
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 0.75em;
      font-weight: 600;
      margin-right: 8px;
    }
    @media (max-width: 768px) {
      #settings-modal {
        padding-top: 60px;
      }
      .settings-container {
        width: 95%;
        max-height: 85vh;
      }
    }
  </style>
</head>
<body>
  <div class="toggle-buttons">
    <button id="search-toggle" title="Search">🔍</button>
    <button id="plugin-toggle" title="Plugins">🔌</button>
    <button id="settings-toggle" title="Settings">⚙</button>
    <button id="theme-toggle" title="Toggle theme">☀</button>
    <button id="layout-toggle" title="Toggle layout">|||</button>
  </div>
  <div class="container">
    <div id="error"></div>
    <div id="source-badge"></div>
    <div id="content"></div>
  </div>

  <!-- Search Modal -->
  <div id="search-modal">
    <div class="search-container">
      <div class="search-header">
        <input type="text" id="search-input" placeholder="Search pages, #tags, or property:value..." autocomplete="off">
      </div>
      <div class="search-results" id="search-results">
        <div class="search-no-results">Type to search...</div>
      </div>
      <div class="search-pagination" id="search-pagination" style="display: none;">
        <button id="search-prev-page">‹ Prev</button>
        <span class="search-pagination-info" id="search-page-info"></span>
        <button id="search-next-page">Next ›</button>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal">
    <div class="settings-container">
      <div class="settings-header">
        <h2>Source Configuration</h2>
        <button id="close-settings" class="close-button">×</button>
      </div>
      <div class="settings-content">
        <div id="sources-list" class="sources-list">
          <!-- Dynamic list of configured sources -->
        </div>
        <div class="add-source-form">
          <h3 id="source-form-title">Add New Source</h3>
          <input type="text" id="source-name" placeholder="Source name (e.g., local-docs, prod-wiki)" pattern="[a-zA-Z0-9_-]+" title="Only letters, numbers, dashes, and underscores. No spaces.">
          <input type="url" id="source-index-url" placeholder="Index URL (search-index.json)">
          <input type="url" id="source-content-url" placeholder="Content base URL">
          <div style="display: flex; gap: 10px;">
            <button id="add-source-btn">Add Source</button>
            <button id="cancel-edit-btn" style="display: none;">Cancel</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Plugin Manager Modal -->
  <div id="plugin-modal">
    <div class="plugin-container">
      <div class="plugin-header">
        <h2>Plugin Manager</h2>
        <button id="close-plugins" class="close-button">×</button>
      </div>
      <div class="plugin-content">
        <div class="plugin-list" id="plugin-list">
          <!-- Dynamically populated -->
        </div>
        <div class="plugin-install-section">
          <h3>Install Remote Plugin</h3>
          <input type="url" id="remote-plugin-url" placeholder="Plugin URL..." disabled>
          <button id="install-remote-plugin" disabled>Install (Coming Soon)</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
